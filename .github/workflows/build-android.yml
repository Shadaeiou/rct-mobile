name: Build Android

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Decode signing keystore
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is empty. Add it under Settings > Secrets > Actions."
            exit 1
          fi
          KEYSTORE_PATH="$RUNNER_TEMP/release.jks"
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          echo "RELEASE_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "RELEASE_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build release APK
        working-directory: android
        run: gradle :app:assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Compute version
        id: ver
        run: |
          CODE=$(git rev-list --count HEAD)
          NAME="0.1.$CODE"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "tag=v${NAME}+${CODE}" >> "$GITHUB_OUTPUT"

      - name: Publish auto-release (main branch)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.name }} (build ${{ steps.ver.outputs.code }})
          files: android/app/build/outputs/apk/release/app-release.apk
          body: |
            Automated release from commit ${{ github.sha }}.

      - name: Attach APK to manual tag release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk

      - name: Set up Python
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Send FCM update push
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        env:
          FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
          NAME: ${{ steps.ver.outputs.name }}
          CODE: ${{ steps.ver.outputs.code }}
        run: |
          if [ -z "$FCM_SERVICE_ACCOUNT_JSON" ]; then
            echo "FCM_SERVICE_ACCOUNT_JSON not set; skipping push."
            exit 0
          fi
          pip install --quiet google-auth google-auth-httplib2 requests
          python scripts/send_fcm_update_push.py "$NAME" "$CODE"
